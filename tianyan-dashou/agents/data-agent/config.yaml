# Data Agent 配置文件

# Sentinel-2 数据源配置
sentinel:
  # Copernicus Open Access Hub
  scihub_url: "https://scihub.copernicus.eu/dhus"
  scihub_username: "your_username"
  scihub_password: "your_password"
  
  # Sentinel Hub (备用)
  sentinelhub_url: "https://services.sentinel-hub.com/ogc/wms"
  sentinelhub_key: "your_key"
  
  # 采集参数
  resolution: 10  # 米
  bands: ["B04", "B08", "B11"]  # 红、近红外、短波红外
  cloud_coverage_max: 30  # 最大云覆盖率(%)

# 气象数据配置
weather:
  # 国家气象局API
  nmc_api_url: "http://api.weather.com"
  nmc_api_key: "your_nmc_key"
  
  # 和风天气API (备用)
  qweather_api_url: "https://devapi.qweather.com/v7"
  qweather_api_key: "your_qweather_key"
  
  # 采集参数
  update_frequency: "daily"  # 每日更新
  
# 地块数据配置
plots:
  # 数据来源
  source: "geojson"  # geojson或数据库
  geojson_path: "../../data/plots.geojson"
  
  # 数据字段映射
  field_mapping:
    plot_id: "plot_id"
    plot_name: "plot_name"
    area_mu: "area_mu"
    crop_type: "crop_type"
    variety: "variety"
    owner: "owner"
    phone: "phone"

# 数据库配置
database:
  postgres:
    url: "postgresql://user:pass@db:5432/tianyan"
  
  # 时序数据库
  timescale:
    enabled: true
    chunk_time_interval: "1 month"

# 存储配置
storage:
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "tianyan-satellite"
  
  # 本地存储（备用）
  local:
    enabled: true
    base_path: "../../data/satellite"

# 任务配置
task:
  schedule:
    enabled: true
    interval: "weekly"  # 每周执行
    day: "monday"  # 周一执行
    time: "09:00"  # 上午9点
  
  # 并行处理
  parallel:
    enabled: true
    max_workers: 4

# 日志配置
logging:
  level: "INFO"
  file: "../../logs/data-agent.log"
  rotation: "7 days"
  retention: "30 days"